credentials_for_provider:
  api_key:
    help:
      en_US: Required for Flyfus Tool setup.
      zh_Hans: Flyfus Tool 入口配置必填。
    label:
      en_US: API Key
      zh_Hans: API Key
    placeholder:
      en_US: Enter API Key
      zh_Hans: 输入 API Key
    required: true
    type: secret-input
  endpoint_url:
    help:
      en_US: Required for Flyfus Tool setup.
      zh_Hans: Flyfus Tool 入口配置必填。
    label:
      en_US: API endpoint URL
      zh_Hans: API 地址
    placeholder:
      en_US: Base URL, e.g. https://litellm.flyfus.com
      zh_Hans: Base URL，例如 https://litellm.flyfus.com
    required: true
    type: text-input
  oss_api_base_url:
    help:
      en_US: Required OSS upload API base URL.
      zh_Hans: 必填。OSS 上传服务基础地址。
    label:
      en_US: OSS API Base URL
      zh_Hans: OSS API 基础地址
    placeholder:
      en_US: https://oss-api.example.com
      zh_Hans: https://oss-api.example.com
    required: true
    type: text-input
  oss_api_token:
    help:
      en_US: Required OSS upload API token.
      zh_Hans: 必填。OSS 上传服务鉴权 Token。
    label:
      en_US: OSS API Token
      zh_Hans: OSS API Token
    placeholder:
      en_US: Enter OSS API Token
      zh_Hans: 输入 OSS API Token
    required: true
    type: secret-input
  sls_endpoint:
    help:
      en_US: Required Alibaba Cloud SLS endpoint for tool invocation logs.
      zh_Hans: 必填。阿里云 SLS 日志服务地址。
    label:
      en_US: SLS Endpoint
      zh_Hans: SLS 地址
    placeholder:
      en_US: https://us-east-1.log.aliyuncs.com
      zh_Hans: 例如 https://us-east-1.log.aliyuncs.com
    required: true
    type: text-input
  sls_project:
    help:
      en_US: Required Alibaba Cloud SLS project for tool invocation logs.
      zh_Hans: 必填。阿里云 SLS 日志项目。
    label:
      en_US: SLS Project
      zh_Hans: SLS 项目
    placeholder:
      en_US: Enter SLS project name
      zh_Hans: 输入 SLS 项目名称
    required: true
    type: text-input
  sls_access_key_id:
    help:
      en_US: Required Alibaba Cloud SLS AccessKey ID.
      zh_Hans: 必填。阿里云 SLS AccessKey ID。
    label:
      en_US: SLS AccessKey ID
      zh_Hans: SLS AccessKey ID
    placeholder:
      en_US: Enter SLS AccessKey ID
      zh_Hans: 输入 SLS AccessKey ID
    required: true
    type: secret-input
  sls_access_key_secret:
    help:
      en_US: Required Alibaba Cloud SLS AccessKey Secret.
      zh_Hans: 必填。阿里云 SLS AccessKey Secret。
    label:
      en_US: SLS AccessKey Secret
      zh_Hans: SLS AccessKey Secret
    placeholder:
      en_US: Enter SLS AccessKey Secret
      zh_Hans: 输入 SLS AccessKey Secret
    required: true
    type: secret-input
  geo_url:
    help:
      en_US: Optional backend base URL used by the Skills tool.
      zh_Hans: 可选。Skills 工具使用的后端基础地址。
    label:
      en_US: Geo URL
      zh_Hans: Geo 地址
    placeholder:
      en_US: https://example.com
      zh_Hans: https://example.com
    required: false
    type: text-input
  geo_key:
    help:
      en_US: Optional bearer token for the Skills tool backend.
      zh_Hans: 可选。Skills 工具后端的 Bearer Token。
    label:
      en_US: Geo Key
      zh_Hans: Geo Key
    placeholder:
      en_US: Enter Skills API Key
      zh_Hans: 输入 Skills API Key
    required: false
    type: secret-input
extra:
  python:
    source: provider/flyfus_tool.py
identity:
  author: qaqab
  description:
    en_US: Flyfus tools for generating images and controlling the next agent step.
    zh_Hans: Flyfus 图像生成与下一步 Agent 控制工具。
  icon: icon.svg
  label:
    en_US: Flyfus Tool
    zh_Hans: Flyfus 工具
  name: flyfus_tool
  tags:
    - image
    - productivity
    - utilities
tools:
  - tools/image/flyfus_image_generate.yaml
  - tools/next_step/set_next_step.yaml
  - tools/read_file/read_file.yaml
  - tools/skills/flyfus_skills.yaml
  - tools/router/flyfus_tool_router.yaml
