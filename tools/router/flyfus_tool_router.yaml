identity:
  author: qaqab
  name: flyfus_tool_router
  label:
    en_US: Flyfus Tool Router
    zh_Hans: Flyfus 工具路由
description:
  human:
    en_US: Lists Geo-managed Dify tools and concurrently invokes selected tools.
    zh_Hans: 查询 Geo 管理的 Dify 工具，并发调用选中的工具。
  llm: |-
    使用 method=list_tools 查询 Geo 提供的 Dify 工具目录及参数；需要执行时使用 method=invoke_tools。
    invoke_tools 的 tool_calls 是 JSON 数组，每项格式为 {"name":"list_tools 返回的工具 name","parameters":{}}。
    可一次传多个调用，它们会并发执行。工具必须来自刚刚返回的目录。
parameters:
  - name: method
    type: select
    required: true
    form: llm
    options:
      - value: list_tools
        label: {en_US: List Tools, zh_Hans: 查询工具}
      - value: invoke_tools
        label: {en_US: Invoke Tools, zh_Hans: 调用工具}
    label: {en_US: Method, zh_Hans: 操作}
    human_description:
      en_US: List Geo-managed tools or invoke one or more of them.
      zh_Hans: 查询 Geo 管理的工具，或调用一个或多个工具。
    llm_description: "list_tools 查询动态工具目录；invoke_tools 并发调用目录中的工具。"
  - name: tool_calls
    type: string
    required: false
    form: llm
    label: {en_US: Tool Calls, zh_Hans: 工具调用列表}
    human_description:
      en_US: A JSON array of catalog tool calls, used only with invoke_tools.
      zh_Hans: 工具目录调用的 JSON 数组，仅在 invoke_tools 时使用。
    llm_description: '仅 invoke_tools 时必填。示例：[{"name":"workflow.provider-id.tool-name","parameters":{"input":"example"}}]。'
extra:
  python:
    source: tools/router/flyfus_tool_router.py
